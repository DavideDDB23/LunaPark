<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luna Park — 3D Amusement Park</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #c {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      user-select: none;
    }
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    Luna Park — Phase 1<br />
    Drag: orbit · Scroll: zoom · Right-drag: pan<br />
    <label style="pointer-events: auto;">
      Wind: <input id="wind" type="range" min="0" max="3" step="0.05" value="1" style="vertical-align: middle;" />
      <span id="windVal">1.00</span>
    </label>
  </div>
  <div id="loader">Loading scene…</div><div id="debug" style="position:absolute;z-index:9999;color:red;font-size:20px;"></div>
  <script src="debug.js"></script><script type="module" src="js/main.js?1779276054"></script>
</body>
</html>
